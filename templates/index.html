<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Analysis System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="search-container">
            <h2 class="text-center mb-2">Trend Analysis System</h2>
            <p class="text-center text-muted mb-4">Discover what's trending using multi-seed analysis &amp; NLP</p>

            {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
            {% endif %}

            <form id="analysisForm" action="/search" method="get" aria-busy="false">
                <div class="mb-3">
                    <label class="form-label">Category</label>
                    <select name="category" class="form-select" id="categorySelect">
                        {% for cat_id, cat in categories.items() %}
                        <option value="{{ cat_id }}" {{ 'selected' if cat_id == '18' }}>{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Time Range</label>
                    <select name="date" class="form-select">
                        <option value="now 7-d">Past 7 Days</option>
                        <option value="today 1-m" selected>Past 30 Days</option>
                        <option value="today 3-m">Past 90 Days</option>
                        <option value="today 12-m">Past 12 Months</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">
                    Analyze Trends
                </button>
            </form>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" role="status" aria-live="polite" aria-hidden="true">
        <div class="loader" aria-hidden="true"></div>
        <p class="loading-overlay__text">
            The system is working hard to analyze and validate your results. Might be 2-5 mins. Please wait.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function () {
            var form = document.getElementById('analysisForm');
            var overlay = document.getElementById('loadingOverlay');
            if (!form || !overlay) return;

            form.addEventListener('submit', function () {
                form.setAttribute('aria-busy', 'true');
                overlay.classList.add('is-visible');
                overlay.setAttribute('aria-hidden', 'false');
            });
        })();
    </script>
</body>
</html>
