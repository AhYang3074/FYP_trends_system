<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trend Analyzer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .search-container { margin-top: 100px; max-width: 600px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container d-flex justify-content-center">
        <div class="search-container">
            <h2 class="text-center mb-4">Trend Analysis System</h2>
            <form action="/search" method="get">
                <div class="mb-3">
                    <label class="form-label">Search Keyword</label>
                    <input type="text" name="q" class="form-control" placeholder="e.g. Artificial Intelligence" required>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Category</label>
                        <select name="category" class="form-select">
                            <option value="0">All Categories</option>
                            <option value="18" selected>Technology (18)</option>
                            <option value="7">Finance (7)</option>
                            <option value="3">Business (3)</option>
                        </select>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label">Time Range</label>
                        <select name="date" class="form-select">
                            <option value="today 1-m">Past 30 Days</option>
                            <option value="today 3-m">Past 90 Days</option>
                            <option value="today 12-m">Past 12 Months</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mt-3">Analyze Now</button>
            </form>
        </div>
    </div>
</body>
</html>
