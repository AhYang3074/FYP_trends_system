<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results - Trend System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container mt-5 mb-5">
        <div class="d-flex justify-content-between align-items-center mb-4 p-3 bg-white rounded shadow-sm">
            <div>
                <h2 class="mb-0">Analysis for: <span class="text-primary">{{ query }}</span></h2>
                <small class="text-muted">Based on real-time search trends and normalized data</small>
            </div>
            <a href="/" class="btn btn-outline-primary px-4">New Search</a>
        </div>

        <div class="card border-0 shadow-lg">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr class="table-light">
                            <th class="ps-4">Rank</th>
                            <th>Topic (Normalized)</th>
                            <th>Trend Score</th>
                            <th style="width: 40%;" class="pe-4">Intensity Visual</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for name, score in results %}
                        <tr>
                            <td class="ps-4 align-middle">
                                <span class="badge rounded-pill bg-light text-dark border">{{ loop.index }}</span>
                            </td>
                            <td class="align-middle text-capitalize">
                                <strong>{{ name }}</strong>
                            </td>
                            <td class="align-middle">
                                <span class="text-muted">{{ score }}</span>
                            </td>
                            <td class="pe-4 align-middle">
                                <div class="progress" style="height: 12px;">
                                    <div class="progress-bar" 
                                         role="progressbar" 
                                         style="width: {{ score }}%;" 
                                         aria-valuenow="{{ score }}" 
                                         aria-valuemin="0" 
                                         aria-valuemax="100">
                                    </div>
                                </div>
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
        
        <p class="text-center mt-4 text-muted small">
            Processed using NLP Normalization & Topic Cleaning Logic
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
